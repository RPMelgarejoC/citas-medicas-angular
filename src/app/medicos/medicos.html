<div class="container">

  <h2 class="mb-4 fw-bold">Gestión de Médicos</h2>

  <button class="btn btn-primary mb-3 shadow-sm" (click)="abrirFormulario()">
    <i class="bi bi-plus-circle me-1"></i> Nuevo Médico
  </button>

  <!-- LISTA -->
  <table class="table table-hover table-striped align-middle shadow-sm">
    <thead>
      <tr>
        <th>Nombre</th>
        <th>Especialidad</th>
        <th>Teléfono</th>
        <th>Acciones</th>
      </tr>
    </thead>

    <tbody>
      @for (m of medicos; track m.id) {
        <tr>
          <td>{{ m.nombre }}</td>
          <td>{{ m.especialidad }}</td>
          <td>{{ m.telefono }}</td>
          <td>
            <button class="btn btn-warning btn-sm me-2" (click)="editarMedico(m)">
              <i class="bi bi-pencil"></i> Editar
            </button>

            <button class="btn btn-danger btn-sm" (click)="eliminarMedico(m.id)">
              <i class="bi bi-trash"></i> Eliminar
            </button>
          </td>
        </tr>
      }
    </tbody>
  </table>

</div>

<!-- MODAL UNIFICADO -->
@if (mostrarFormulario) {
  <!-- FONDO OSCURO -->
  <div class="overlay" (click)="cerrarFormulario()"></div>

  <!-- MODAL -->
  <div class="modal-custom" (click)="$event.stopPropagation()">

    <div class="card shadow">
      <div class="card-body">

        <h5 class="mb-3 text-primary">
          {{ editando ? 'Editar Médico' : 'Nuevo Médico' }}
        </h5>

        <div class="row">
          <div class="col-12 mb-2">
            <input class="form-control" placeholder="Nombre completo" [(ngModel)]="nuevoMedico.nombre">
          </div>

          <div class="col-12 mb-2">
            <input class="form-control" placeholder="Especialidad" [(ngModel)]="nuevoMedico.especialidad">
          </div>

          <div class="col-12 mb-2">
            <input class="form-control" placeholder="Teléfono" [(ngModel)]="nuevoMedico.telefono">
          </div>
        </div>

        <div class="mt-3">
          <button class="btn btn-success me-2" (click)="agregarMedico()">
            <i class="bi bi-check-lg"></i> {{ editando ? 'Actualizar' : 'Guardar' }}
          </button>

          <button class="btn btn-secondary" (click)="cerrarFormulario()">
            <i class="bi bi-x-lg"></i> Cancelar
          </button>
        </div>

      </div>
    </div>

  </div>
}

@if (mostrarToast) {
  <div class="toast-custom bg-{{ tipoToast }}">
    <i class="bi bi-{{ tipoToast === 'success' ? 'check-circle' : 'exclamation-circle' }} me-2"></i>
    {{ mensajeToast }}
  </div>
}
